<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>부모님과 함께 도쿄 여행</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background-color: #fcfcfc;
            color: #333333;
            -webkit-tap-highlight-color: transparent;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .tab-active {
            color: #b38b6d;
            font-weight: 800;
            position: relative;
        }
        .tab-active::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 20px;
            height: 3px;
            background-color: #b38b6d;
            border-radius: 2px;
        }
        .tab-inactive { color: #ced4da; }
        
        .timeline-line {
            position: absolute;
            left: 24px;
            top: 20px;
            bottom: 20px;
            width: 1px;
            border-left: 1px dashed #dee2e6;
            z-index: 0;
        }

        .modal-content {
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-hidden { opacity: 0; visibility: hidden; pointer-events: none; }
        .modal-hidden .modal-content { transform: translateY(100%); }

        #modal-desc { white-space: pre-wrap; }
        
        .event-card {
            transition: all 0.2s ease;
        }
        .event-card:active { transform: scale(0.97); background-color: #f8f9fa; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <!-- Modal -->
    <div id="details-modal" class="fixed inset-0 z-[100] flex items-end sm:items-center justify-center bg-black/50 backdrop-blur-sm modal-hidden" onclick="closeModalOnBackdrop(event)">
        <div class="modal-content bg-white w-full max-w-lg rounded-t-[40px] sm:rounded-[40px] overflow-hidden shadow-2xl flex flex-col max-h-[92vh]">
            <div id="modal-image" class="h-64 w-full bg-cover bg-center relative">
                <div class="absolute inset-0 bg-gradient-to-t from-black/60 via-black/20 to-transparent"></div>
                <button onclick="closeModal()" class="absolute top-6 right-6 bg-white/10 backdrop-blur-md text-white w-10 h-10 rounded-full flex items-center justify-center border border-white/20">
                    <i class="fa-solid fa-xmark"></i>
                </button>
                <div class="absolute bottom-6 left-8 text-white">
                    <p id="modal-subtitle" class="text-[10px] font-bold uppercase tracking-[0.2em] opacity-80 mb-1">CATEGORY</p>
                    <h3 id="modal-title" class="text-2xl font-black tracking-tight">장소 이름</h3>
                </div>
            </div>
            <div class="p-8 space-y-6 overflow-y-auto no-scrollbar">
                <div class="space-y-4">
                    <div class="flex items-center gap-2 text-amber-700">
                        <i class="fa-solid fa-map-location-dot"></i>
                        <span class="text-xs font-bold uppercase tracking-widest">상세 이동 경로 및 안내</span>
                    </div>
                    <div id="modal-desc" class="text-[14px] text-gray-600 leading-relaxed font-medium"></div>
                </div>
                
                <div class="bg-gray-50 p-5 rounded-3xl border border-gray-100">
                    <p class="text-[10px] text-gray-400 font-bold uppercase mb-2">Location Information</p>
                    <div id="modal-extra" class="text-xs text-gray-700 font-bold"></div>
                </div>

                <div class="flex gap-3 pt-2">
                    <a id="modal-map-link" href="#" target="_blank" class="flex-1 bg-gray-900 text-white text-center py-4 rounded-2xl font-bold text-sm">
                        <i class="fa-solid fa-location-dot mr-2"></i>지도에서 위치 확인
                    </a>
                </div>
            </div>
        </div>
    </div>

    <!-- Header -->
    <header class="bg-white/90 backdrop-blur-md sticky top-0 z-50 px-6 py-5 border-b border-gray-50 flex justify-between items-center">
        <div>
            <h1 class="text-xl font-black text-gray-900 tracking-tighter">Family Trip <span class="text-amber-800">TOKYO</span></h1>
            <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest mt-0.5">March 13 - 16, 2026</p>
        </div>
        <div class="flex flex-col items-end">
            <span class="text-[10px] bg-amber-50 text-amber-800 px-3 py-1 rounded-full font-black uppercase">4 People</span>
        </div>
    </header>

    <main class="flex-grow max-w-xl mx-auto w-full px-5 py-8 space-y-10">

        <!-- Itinerary Section -->
        <section class="bg-white rounded-[48px] shadow-2xl shadow-gray-200/50 border border-gray-100 overflow-hidden">
            <!-- Tabs -->
            <div class="flex border-b border-gray-50 sticky top-[72px] bg-white/95 backdrop-blur-sm z-30">
                <button onclick="switchTab(1)" id="tab-1" class="flex-1 py-6 text-xs transition-all tab-active font-black">13(금)</button>
                <button onclick="switchTab(2)" id="tab-2" class="flex-1 py-6 text-xs transition-all tab-inactive font-black">14(토)</button>
                <button onclick="switchTab(3)" id="tab-3" class="flex-1 py-6 text-xs transition-all tab-inactive font-black">15(일)</button>
                <button onclick="switchTab(4)" id="tab-4" class="flex-1 py-6 text-xs transition-all tab-inactive font-black">16(월)</button>
            </div>

            <!-- Content Area -->
            <div class="p-8 pt-12 min-h-[500px]">
                <div id="day-content" class="space-y-10 relative">
                    <!-- Cards will be injected here -->
                </div>
            </div>
        </section>

        <!-- Prep Checklist for Mobile -->
        <section class="space-y-4">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest px-2">Essential Prep</h3>
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-5 rounded-[32px] border border-gray-100 shadow-sm flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-amber-50 flex items-center justify-center text-amber-600">
                        <i class="fa-solid fa-qrcode"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-black text-gray-800">Visit Japan</p>
                        <p class="text-[9px] text-gray-400">QR 캡처 완료</p>
                    </div>
                </div>
                <div class="bg-white p-5 rounded-[32px] border border-gray-100 shadow-sm flex items-center gap-3">
                    <div class="w-10 h-10 rounded-2xl bg-blue-50 flex items-center justify-center text-blue-600">
                        <i class="fa-solid fa-sim-card"></i>
                    </div>
                    <div>
                        <p class="text-[11px] font-black text-gray-800">e-SIM</p>
                        <p class="text-[9px] text-gray-400">4인 기기 체크</p>
                    </div>
                </div>
            </div>
        </section>

        <!-- Budget Section (Restored to fix JS error) -->
        <section class="bg-white p-8 rounded-[40px] shadow-sm border border-gray-100">
            <h3 class="text-xs font-black text-gray-400 uppercase tracking-widest mb-6">💰 예상 현지 지출 (4인)</h3>
            <div class="h-[220px] relative">
                <canvas id="budgetChart"></canvas>
            </div>
        </section>

    </main>

    <footer class="bg-gray-50 py-16 text-center">
        <p class="text-[10px] font-black text-gray-300 uppercase tracking-[0.3em]">Enjoy Your Journey</p>
    </footer>

    <script>

                { id: "ebisu", time: "11:30", title: "에비스 브루어리 도쿄", desc: "맥주 박물관 및 신선한 시음", icon: "fa-beer-mug-empty", color: "amber",

                },
                { id: "tokyo_st", time: "15:00", title: "도쿄역 및 고쿄 투어", desc: "도쿄역 광장 산책 및 내부 투어", icon: "fa-landmark", color: "red", 
                    img: "image_e083c4.jpg", subtitle: "TOUR", 
                    fullDesc: `에비스에서 JR 야마노테선으로 도쿄역 이동.

                { id: "seigou", time: "18:00", title: "니혼바시 야키니쿠 세이고", desc: "최고급 와규 저녁 식사", icon: "fa-fire-burner", color: "amber", 
                    img: "image_e08389.jpg", subtitle: "DINNER", 
                    fullDesc: `도쿄역에서 택시로 6분 거리입니다. 
입안에서 녹는 와규를 부모님께 대접하세요. 가족 여행의 품격을 높여줄 식당입니다.`, 
                    extra: "Nihonbashi Yakiniku Seigou", query: "Nihonbashi Yakiniku Seigou"
                }
            ],

                    extra: "Ueno Park", query: "Ueno Park"
                },
                { id: "unatoto", time: "11:15", title: "나다이 우나토토 우에노점", desc: "숯불 장어덮밥 가성비 맛집", icon: "fa-bowl-rice", color: "amber", 
                    img: "image_e080c1.jpg", subtitle: "LUNCH", 
                    fullDesc: `11시 30분 이후 대기가 길어지므로 11시 15분 도착을 권장합니다.

                },

        let currentDay = 1;

        function switchTab(day) {
            currentDay = day;
            for(let i=1; i<=4; i++) {
                const tab = document.getElementById(`tab-${i}`);
                if (i === day) {
                    tab.classList.remove('tab-inactive');
                    tab.classList.add('tab-active');
                } else {
                    tab.classList.add('tab-inactive');
                    tab.classList.remove('tab-active');
                }
            }
            renderTimeline(day);
        }

        function renderTimeline(day) {
            const container = document.getElementById('day-content');
            const events = itineraryData[day];
            let html = '<div class="timeline-line"></div>';

            events.forEach((event, index) => {
                const colorMap = {
                    blue: 'bg-blue-100 text-blue-600',
                    amber: 'bg-amber-100 text-amber-600',
                    green: 'bg-green-100 text-green-600',
                    red: 'bg-red-100 text-red-600',
                    purple: 'bg-purple-100 text-purple-600',
                    gray: 'bg-gray-100 text-gray-600'
                };

                let directionsBtn = "";
                if (index > 0) {
                    const prevQuery = events[index-1].query;
                    const destQuery = event.query;
                    const googleDirectionsUrl = `https://www.google.com/maps/dir/?api=1&origin=${encodeURIComponent(prevQuery)}&destination=${encodeURIComponent(destQuery)}&travelmode=transit`;
                    
                    directionsBtn = `
                        <a href="${googleDirectionsUrl}" target="_blank" class="inline-flex items-center mt-4 text-[11px] font-black text-amber-800 bg-amber-50/50 px-4 py-2 rounded-2xl border border-amber-100/30 active:scale-95 transition-transform">
                            <i class="fa-solid fa-route mr-2"></i> 이전 장소에서 오는 길 확인
                        </a>
                    `;
                }

                html += `
                    <div class="relative pl-14">
                        <div class="absolute left-0 top-1.5 w-12 h-12 rounded-[20px] ${colorMap[event.color]} flex items-center justify-center border-4 border-white shadow-xl z-10" onclick="openModal(${day}, '${event.id}')">
                            <i class="fa-solid ${event.icon} text-base"></i>
                        </div>
                        <div class="event-card bg-white rounded-[32px] p-6 border border-gray-50 shadow-sm shadow-gray-100/50" onclick="openModal(${day}, '${event.id}')">
                            <div class="flex justify-between items-center mb-2.5">
                                <span class="text-[11px] font-black text-gray-300 uppercase tracking-[0.2em]">${event.time}</span>
                                <i class="fa-solid fa-chevron-right text-[10px] text-gray-200"></i>
                            </div>
                            <h4 class="font-black text-gray-900 text-lg mb-1 tracking-tight">${event.title}</h4>
                            <p class="text-gray-400 text-[12px] leading-snug font-medium">${event.desc}</p>
                            ${directionsBtn}
                        </div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function openModal(day, eventId) {
            const event = itineraryData[day].find(e => e.id === eventId);
            if (!event) return;

            document.getElementById('modal-image').style.backgroundImage = `url('${event.img}')`;
            document.getElementById('modal-title').innerText = event.title;
            document.getElementById('modal-subtitle').innerText = event.subtitle;
            document.getElementById('modal-desc').innerText = event.fullDesc;
            document.getElementById('modal-extra').innerText = event.extra;
            document.getElementById('modal-map-link').href = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(event.query)}`;
            
            const modal = document.getElementById('details-modal');
            modal.classList.remove('modal-hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            const modal = document.getElementById('details-modal');
            modal.classList.add('modal-hidden');
            document.body.style.overflow = 'auto';
        }

        function closeModalOnBackdrop(e) {
            if (e.target.id === 'details-modal') closeModal();
        }

        document.addEventListener('DOMContentLoaded', () => {
            switchTab(1);

            const canvas = document.getElementById('budgetChart');
            if (canvas) {
                const ctx = canvas.getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        labels: ['식비', '교통', '기타'],
                        datasets: [{
                            data: [180000, 45000, 30000],
                            backgroundColor: ['#f8d7da', '#fff3cd', '#e2e3e5'],
                            borderWidth: 0,
                            hoverOffset: 12
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        cutout: '80%',
                        plugins: {
                            legend: { position: 'bottom', labels: { boxWidth: 12, font: { size: 11, weight: 'bold' }, padding: 25 } },
                            tooltip: {
                                callbacks: {
                                    label: function(context) { return ' ' + context.label + ': ' + context.raw.toLocaleString() + '엔'; }
                                }
                            }
                        }
                    }
                });
            }
        });
    </script>
</body>
</html>
